name: TypeFlow
options:
  bundleIdPrefix: com.cotyper
packages:
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: 0.12.0
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: 3.31.3
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: 0.1.0
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    from: 0.0.1
targets:
  TypeFlow:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: TypeFlow
    dependencies:
      - package: mlx-swift
        product: MLX
      - package: mlx-swift
        product: MLXRandom
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-transformers
        product: Transformers
      - package: swift-huggingface
        product: HuggingFace
    info:
      path: TypeFlow/Info.plist
      properties:
        LSUIElement: true
        NSAccessibilityUsageDescription: "TypeFlow needs Accessibility access to detect typing and inject completions."
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSServices:
          - NSMenuItem:
              default: "Rewrite with TypeFlow"
            NSMessage: rewriteText
            NSPortName: TypeFlow
            NSSendTypes:
              - NSStringPboardType
            NSReturnTypes:
              - NSStringPboardType
          - NSMenuItem:
              default: "Expand with TypeFlow"
            NSMessage: expandText
            NSPortName: TypeFlow
            NSSendTypes:
              - NSStringPboardType
            NSReturnTypes:
              - NSStringPboardType
    entitlements:
      path: TypeFlow/TypeFlow.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.get-task-allow: true
